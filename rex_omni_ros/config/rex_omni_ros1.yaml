# Parameters for the rex_omni node (ROS1; loaded into the node's private
# namespace by launch/rex_omni.launch). Keep in sync with rex_omni_ros2.yaml.
model_path: "0xNOY/Rex-Omni-AWQ-QLMHead"
gpu_memory_utilization: 0.0
max_model_len: 4096
# pixels must be a multiple of 28^2
min_pixels: 12544
max_pixels: 401408 # higher values higher accuracy and slower prefill
max_tokens: 4096
temperature: 0.0
top_p: 0.8
top_k: 1
repetition_penalty: 1.05
enable_confidence: true
warmup: true
compile_vit: true # torch.compile the ViT encoder: ~6% faster prefill, ~+30 s load time
enable_sleep_mode: true
