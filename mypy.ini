[mypy]
python_version = 3.12
; Without this, the rex_omni_msgs interface-definition directories (msg/,
; srv/) at the repository root are mistaken for Python namespace packages.
namespace_packages = False

; The inference stack is imported lazily and is absent in the ci
; environments; treat it as Any everywhere so results do not depend on
; whether vLLM is installed.
[mypy-vllm.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-torch.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-huggingface_hub.*]
ignore_missing_imports = True
follow_imports = skip

; ROS client libraries and generated message packages ship no type stubs.
[mypy-rospy.*]
ignore_missing_imports = True

[mypy-rclpy.*]
ignore_missing_imports = True

[mypy-rex_omni_msgs.*]
ignore_missing_imports = True

[mypy-sensor_msgs.*]
ignore_missing_imports = True

[mypy-std_srvs.*]
ignore_missing_imports = True
